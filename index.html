<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ejercicio: Desarrollar una aplicación web completa centrada en la arquitectura de la información utilizando HTML5."/>
    <meta name="keywords" content="Ferrari, coche, deportivo"/>
    <meta name="author" content="Alvaro Gutierrez Villalba"/>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link  href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel='stylesheet' type='text/css'>
    <style>
      *{
        margin: 0;
        padding: 0;
        overflow-y: hidden;
      }
      body{
        background-color: whitesmoke;
      }
      header{
        margin-top: 10px;
      }
      nav {
        display: flex;
      }
      img {
        position: fixed;
      }
      #header_menu{
        display: flex;
        list-style: none;
        position: fixed;
        margin-left: 100px;
      }
      .header_menu_button{
        padding: 25px;
      }
      .header_menu_links{
        color: white;
        text-decoration: none;
        cursor: pointer;
        font-family: Montserrat;
        font-size: 14px;
      }
      .header_menu_search{
        position: fixed;
        padding-top: 20px;
        margin-left: 95%;
        color: white;
        text-decoration: none;
        cursor: pointer;
        font-family: Montserrat;
        font-size: 14px;
      }
      main {
        background-color: whitesmoke;
      }
      .Ferrari_Video {
        position: absolute;
        width: 100%; 
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }
      .Ferrari_Video video {
        width: 100%; 
        height: 100%;
        object-fit: cover;
      }
      .sections{
        background-color: red;
      }
    </style>
    <title>Ferrari</title>
  </head>
  <body>
    <header>
      <nav>
        <img src="/assets/images/Ferrari_logo_.png" alt="Ferrari logo" width="100px" />
        <ul id="header_menu">
          <li class="header_menu_button"><a href="https://www.ferrari.com/en-ES/formula1" class="header_menu_links">RACING</a></li>
          <li class="header_menu_button"><a href="https://www.ferrari.com/es-ES/auto/f80" class="header_menu_links">SPORT CARS</a></li>
          <li class="header_menu_button"><a href="https://store.ferrari.com/en-gb/" class="header_menu_links">COLECCIONES</a></li>
          <li class="header_menu_button"><a href="https://www.ferrari.com/en-ES/corse-clienti" class="header_menu_links">EXPERIENCIAS</a></li>
          <li class="header_menu_button"><a href="https://www.ferrari.com/en-ES/corporate/about-us" class="header_menu_links">ABOUT US</a></li>
        </ul>
      </nav>
      <a href="https://www.ferrari.com/es-ES/search" class="header_menu_search">SEARCH</a>
    </header>
    <main>
      <section class="Ferrari_Video">
        <video autoplay muted loop alt="Video de presentacion del Ferrari F80">
          <source src="/assets/videos/Ferrari_F80.mp4" type="video/mp4">
          Your browser does not support HTML5 video.
        </video>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
